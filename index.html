<style>
  /* Remove margens padrão do Blogger para o iframe ocupar tudo */
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .omega-return-btn{display:none}
  .modesk-wrapper {
    position: fixed; /* Fixa na tela */
    top: 0;
    left: 0;
    width: 100vw; /* 100% da largura da tela */
    height: 100vh; /* 100% da altura da tela */
    z-index: 9999; /* Garante que fique acima de tudo */
    background: #f4f6f9;
  }

  .modesk-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>

<div class="modesk-wrapper">
  <iframe
    src="https://callangonerd-dev.github.io/callangonerd/"
    title="Callango Nerd"
    allow="clipboard-read; clipboard-write; storage-access; fullscreen; cross-origin-isolated"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>
