/* =========================================================
   src/layers/api — Blogger Service
   Substitua por: fetch('https://www.callangonerd.com/feeds/posts/default?alt=json')
   e mapeie os campos abaixo (title/link/category/media$thumbnail/content).
   ========================================================= */
const api = {
  all: () => POSTS,
  byId: id => POSTS.find(p=>p.id===id),
  byCategory: c => POSTS.filter(p=>p.cats.map(x=>x.toLowerCase()).includes(c.toLowerCase())),
  reviews: () => POSTS.filter(p=>p.cats.includes('CRÍTICAS')),
  news: () => POSTS.filter(p=>!p.cats.includes('CRÍTICAS')),
  movies: () => POSTS.filter(p=>p.cats.includes('FILMES')||p.cats.includes('CINEMA')),
  categories: () => [...new Set(POSTS.flatMap(p=>p.cats))],
  years: () => [...new Set(POSTS.map(p=>+p.date.slice(0,4)))].sort((a,b)=>b-a),
  archiveMap: () => {
    const m={}; POSTS.forEach(p=>{const k=p.date.slice(0,7);(m[k]=m[k]||[]).push(p)}); return m;
  },
  // Simulação: derive rating estável do id
  rating: p => { let h=0; for(const c of p.id)h=(h*31+c.charCodeAt(0))&0xff; return (6+(h%40)/10).toFixed(1) },
  search: q => POSTS.filter(p=>p.title.toLowerCase().includes(q.toLowerCase()))
};

/* =========================================================
   src/layers/ui — Design System
   ========================================================= */
const Button = ({variant='primary',className='',children,...p}) => {
  const base="inline-flex items-center gap-2 px-5 py-2.5 rounded-full font-semibold text-sm tracking-wide uppercase transition btn-glow";
  const vs={primary:"bg-brand text-white hover:bg-red-600",ghost:"glass text-white hover:bg-white/10",outline:"border border-white/25 text-white hover:bg-white/10"};
  return <button className={`${base} ${vs[variant]} ${className}`} {...p}>{children}</button>;
};
const Badge = ({children,tone='red'}) => {
  const t={red:'bg-brand text-white',dark:'bg-black/60 text-white ring-1 ring-white/10',white:'bg-white text-black'}[tone];
  return <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-widest ${t}`}>{children}</span>;
};
const SectionTitle = ({icon:Icon,children,action}) => (
  <div className="flex items-end justify-between mb-6 border-b border-white/5 pb-3">
    <h2 className="font-display text-3xl md:text-4xl uppercase flex items-center gap-3">
      <span className="inline-block w-1 h-8 bg-brand"/>{Icon && <Icon size={22} className="text-brand"/>}{children}
    </h2>
    {action}
  </div>
);

/* =========================================================
   src/layers/components
   ========================================================= */
function PostCard({p,variant='poster'}){
  const nav = useNavigate();
  const rating = api.rating(p);
  if (variant==='poster') return (
    <motion.div whileHover={{y:-4}} className="group cursor-pointer" onClick={()=>nav(`/post/${p.id}`)}>
      <div className="relative overflow-hidden rounded-lg hover-zoom ring-1 ring-white/5">
        <img loading="lazy" src={p.img} alt={p.title} className="w-full aspect-[2/3] object-cover bg-ink-800"/>
        <div className="absolute inset-0 grad-hero opacity-95"/>
        <div className="absolute top-2 left-2"><Badge>{p.cats[0]}</Badge></div>
        <div className="absolute top-2 right-2 glass px-2 py-1 rounded text-xs flex items-center gap-1"><Star size={12} className="text-brand fill-brand"/>{rating}</div>
        <div className="absolute bottom-0 left-0 right-0 p-3">
          <h3 className="font-display text-lg md:text-xl uppercase leading-tight group-hover:text-brand transition line-clamp-2">{p.title}</h3>
          <div className="text-[11px] text-white/60 mt-1">{p.date}</div>
        </div>
      </div>
    </motion.div>
  );

  return (
    <motion.article whileHover={{y:-3}} className="group cursor-pointer glass rounded-lg overflow-hidden" onClick={()=>nav(`/post/${p.id}`)}>
      <div className="relative overflow-hidden hover-zoom">
        <img loading="lazy" src={p.img} className="w-full aspect-[16/10] object-cover bg-ink-800"/>
        <div className="absolute top-3 left-3"><Badge>{p.cats[0]}</Badge></div>
      </div>
      <div className="p-4">
        <h3 className="font-display text-xl uppercase leading-tight group-hover:text-brand transition line-clamp-2">{p.title}</h3>
        <p className="text-sm text-white/60 mt-2 line-clamp-2">{p.summary}</p>
        <div className="flex items-center gap-3 mt-3 text-[11px] text-white/50 uppercase tracking-wider">

          <span className="flex items-center gap-1"><Calendar size={11}/>{p.date}</span>

      </div>
    </motion.article>
  );
}

function HeroSlider({items}){
  const [i,setI] = useState(0);
  useEffect(()=>{const t=setInterval(()=>setI(v=>(v+1)%items.length),6500);return()=>clearInterval(t)},[items.length]);
  const p = items[i]; const rating=api.rating(p);
  return (
    <div className="relative h-[92vh] min-h-[600px] overflow-hidden">
      <AnimatePresence mode="wait">
        <motion.img key={p.id} src={p.img} initial={{opacity:0,scale:1.06}} animate={{opacity:1,scale:1}} exit={{opacity:0}} transition={{duration:1}} className="absolute inset-0 w-full h-full object-cover"/>
      </AnimatePresence>
      <div className="absolute inset-0 grad-hero"/>
      <div className="absolute inset-0 grad-side"/>
      <div className="relative z-10 max-w-7xl mx-auto px-6 h-full flex items-end pb-28">
        <AnimatePresence mode="wait">
          <motion.div key={p.id} initial={{opacity:0,y:24}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-10}} transition={{duration:.5}} className="max-w-3xl">
            <div className="flex gap-2 mb-4">{p.cats.slice(0,3).map(c=><Badge key={c}>{c}</Badge>)}</div>
            <h1 className="font-display text-5xl md:text-7xl uppercase leading-[0.95]">{p.title}</h1>
            <div className="flex flex-wrap gap-5 text-sm text-white/80 mt-5">
              <span className="flex items-center gap-1"><Star size={14} className="text-brand fill-brand"/>{rating}</span>
              <span className="flex items-center gap-1"><Calendar size={14}/>{p.date}</span>
              <span className="flex items-center gap-1"><User size={14}/>{p.author}</span>
            </div>
            <p className="text-white/80 mt-4 text-base md:text-lg max-w-2xl line-clamp-3">{p.summary}</p>
            <div className="flex gap-3 mt-6">
              <Link to={`/post/${p.id}`}><Button variant="primary"><Play size={14}/>Ler Agora</Button></Link>
              <Link to={`/post/${p.id}`}><Button variant="ghost"><Bookmark size={14}/>Detalhes</Button></Link>
            </div>
          </motion.div>
        </AnimatePresence>
      </div>
      <div className="absolute bottom-6 right-6 z-10 flex gap-2">
        {items.map((_,k)=><button key={k} onClick={()=>setI(k)} className={`h-1.5 rounded-full transition-all ${k===i?'w-10 bg-brand':'w-4 bg-white/30'}`}/>)}
      </div>
    </div>
  );
}

function CountdownTimer({target}){
  const [t,setT]=useState(()=>diff(target));
  useEffect(()=>{const id=setInterval(()=>setT(diff(target)),1000);return()=>clearInterval(id)},[target]);
  function diff(d){const ms=Math.max(0,new Date(d)-new Date());const s=Math.floor(ms/1000);return{d:Math.floor(s/86400),h:Math.floor((s%86400)/3600),m:Math.floor((s%3600)/60),s:s%60}}
  const Box=({v,l})=><div className="glass rounded px-3 py-2 text-center min-w-[64px]"><div className="font-display text-2xl text-brand">{String(v).padStart(2,'0')}</div><div className="text-[10px] uppercase tracking-widest text-white/60">{l}</div></div>;
  return <div className="flex gap-2"><Box v={t.d} l="dias"/><Box v={t.h} l="hrs"/><Box v={t.m} l="min"/><Box v={t.s} l="seg"/></div>;
}

function ReviewBadge({score}){
  const s=+score;
  const color=s>=9?'text-brand ring-brand':s>=7?'text-white ring-white':'text-white/70 ring-white/40';
  return <div className={`w-16 h-16 rounded-full grid place-items-center ring-2 ${color} glass font-display text-2xl`}>{score}</div>;
}

function CommentSection(){
  const [items,setItems]=useState([
    {u:'CinéfiloBR',t:'Que resenha impecável!',d:'há 2h'},
    {u:'MoviePop',t:'Discordo da nota, achei o segundo ato lento.',d:'há 5h'}

  return (

      <div className="mt-4 space-y-3">

const NAV=[

  const nav=useNavigate();
  useEffect(()=>{const on=()=>setScr(scrollY>20);on();addEventListener('scroll',on);return()=>removeEventListener('scroll',on)},[]);
  const submit=e=>{e.preventDefault();if(q.trim())nav(`/search?q=${encodeURIComponent(q)}`);setOpen(false)};
  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition ${scr?'glass':'bg-gradient-to-b from-black/70 to-transparent'}`}>
      <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between gap-6">
        <Link to="/" className="flex items-center gap-2 shrink-0">
          <span className="w-8 h-8 bg-brand grid place-items-center rounded"><Flame size={18}/></span>

          ))}
        </nav>
        <div className="flex items-center gap-2">
          <form onSubmit={submit} className="hidden md:flex items-center glass rounded-full px-3 py-1.5">

          </form>
          <button className="lg:hidden glass rounded-full p-2" onClick={()=>setOpen(v=>!v)}>{open?<X size={18}/>:<Menu size={18}/>}</button>

                <n.icon size={16}/>{n.label}

  const list = useMemo(()=>api.movies().filter(p=>
    (!cat||p.cats.includes(cat))&&(!year||p.date.startsWith(year))&&(!q||p.title.toLowerCase().includes(q.toLowerCase()))
  ),[cat,year,q]);
  return (
    <>
      <div className="pt-28 pb-6 max-w-7xl mx-auto px-6">

  const rating=api.rating(p);
  const related=api.all().filter(x=>x.id!==p.id && x.cats.some(c=>p.cats.includes(c))).slice(0,4);
  const isReview=p.cats.includes('CRÍTICAS');
  return (
    <article>
      <div className="relative h-[72vh] min-h-[480px]">
        <img src={p.img} className="absolute inset-0 w-full h-full object-cover"/>

          </div>
        </div>
      </div>
      <div className="max-w-6xl mx-auto px-6 py-12 grid lg:grid-cols-[60px_1fr_280px] gap-8">
        <div className="hidden lg:flex flex-col gap-2 sticky top-24 self-start">
          {[Facebook,Twitter,Instagram,Share2].map((I,i)=><button key={i} className="glass p-3 rounded-full hover:text-brand"><I size={16}/></button>)}
        </div>
        <div>
          <p className="text-lg text-white/85 leading-relaxed">{p.summary}</p>
          <p className="text-white/70 leading-relaxed mt-4">
            Este post foi publicado originalmente no blog Callango Nerd. Clique no botão abaixo para ler a matéria completa com todas as análises, imagens e detalhes.
          </p>
          <div className="mt-6 flex flex-wrap gap-3">

            <div className="mt-8 glass rounded-lg p-5 flex items-center gap-5">
              <ReviewBadge score={rating}/>
              <div>
                <div className="font-display text-2xl uppercase">Nota da Redação</div>
                <div className="text-sm text-white/60">Baseado em análise técnica, roteiro, atuação e direção.</div>
              </div>
            </div>
          )}
          <div className="flex flex-wrap gap-2 mt-6">{p.cats.map(t=><Link key={t} to={`/category/${t}`} className="text-[10px] uppercase tracking-widest px-3 py-1.5 rounded-full glass hover:text-brand">#{t}</Link>)}</div>
          <CommentSection/>
        </div>
        <aside className="space-y-4">
          <div className="glass rounded-lg p-5">
            <h4 className="font-display text-xl uppercase mb-3">Autor</h4>
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-full bg-brand grid place-items-center font-display text-xl uppercase">{p.author[0]}</div>
              <div><div className="font-semibold">{p.author}</div><div className="text-xs text-white/50 uppercase tracking-widest">Redator</div></div>
            </div>
          </div>
          <div className="glass rounded-lg p-5">
            <h4 className="font-display text-xl uppercase mb-3">Relacionados</h4>
            <ul className="space-y-3">{related.map(r=>(
              <li key={r.id}><Link to={`/post/${r.id}`} className="flex gap-3 group">
                <img src={r.img} className="w-16 h-16 object-cover rounded"/>
                <span className="text-sm group-hover:text-brand transition line-clamp-3">{r.title}</span>
              </Link></li>
            ))}</ul>
          </div>
        </aside>
      </div>
    </article>
  );
}

function ArchivePage(){
  const map=api.archiveMap();
  const keys=Object.keys(map).sort().reverse();
  return (
    <>
      <div className="pt-28 pb-8 max-w-7xl mx-auto px-6">
        <Badge>Histórico</Badge>
        <h1 className="font-display text-5xl md:text-7xl uppercase mt-3">Arquivo</h1>
      </div>
      <div className="max-w-5xl mx-auto px-6 pb-16 space-y-8">
        {keys.map(k=>(
          <div key={k} className="glass rounded-lg p-6">
            <h3 className="font-display text-2xl text-brand uppercase mb-4">{k}</h3>
            <ul className="divide-y divide-white/5">{map[k].map(n=>(
              <li key={n.id} className="py-3 flex items-center justify-between gap-4">
                <Link to={`/post/${n.id}`} className="hover:text-brand transition line-clamp-1">{n.title}</Link>
                <span className="text-xs text-white/40 shrink-0 uppercase tracking-widest">{n.date}</span>
              </li>
            ))}</ul>
          </div>
        ))}
      </div>
    </>
  );
}

function CategoryPage(){
  const {name}=useParams();
  const list=api.byCategory(name);
  return (
    <>
      <div className="pt-28 pb-8 max-w-7xl mx-auto px-6">
        <Badge>Categoria</Badge>
        <h1 className="font-display text-5xl md:text-7xl uppercase mt-3">{name}</h1>
        <p className="text-white/60 mt-2">{list.length} post(s) encontrado(s).</p>
      </div>
      <div className="max-w-7xl mx-auto px-6 pb-16">
        {list.length===0?<p className="text-white/50 text-center py-20">Nada encontrado.</p>:
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">{list.map(p=><PostCard key={p.id} p={p}/>)}</div>}
      </div>
    </>
  );
}

function SearchPage(){
  const q=new URLSearchParams(useLocation().search).get('q')||'';
  const list=api.search(q);
  return (
    <>
      <div className="pt-28 pb-8 max-w-7xl mx-auto px-6">
        <Badge>Busca</Badge>
        <h1 className="font-display text-5xl md:text-6xl uppercase mt-3">Resultados para "<span className="text-brand">{q}</span>"</h1>
      </div>
      <div className="max-w-7xl mx-auto px-6 pb-16">
        {list.length===0?<p className="text-white/50 text-center py-20">Nenhum resultado.</p>:
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">{list.map(p=><PostCard key={p.id} p={p}/>)}</div>}
      </div>
    </>
  );
}

function NotFound(){
  return (
    <div className="min-h-[70vh] pt-32 grid place-items-center text-center px-6">
      <div>
        <h1 className="font-display text-8xl text-brand">404</h1>
        <p className="text-white/70 mt-2 uppercase tracking-widest">A cena que você procura ficou na sala de edição.</p>
        <Link to="/"><Button variant="primary" className="mt-6">Voltar ao Início</Button></Link>
      </div>
    </div>
  );
}

function App(){
  return (
    <HashRouter>
      <MainLayout>
        <Routes>
          <Route path="/" element={<HomePage/>}/>
          <Route path="/movies" element={<MoviesPage/>}/>
          <Route path="/coming-soon" element={<ComingSoonPage/>}/>
          <Route path="/reviews" element={<ReviewsPage/>}/>
          <Route path="/gossip" element={<GossipPage/>}/>
          <Route path="/post/:id" element={<PostPage/>}/>
          <Route path="/archive" element={<ArchivePage/>}/>
          <Route path="/category/:name" element={<CategoryPage/>}/>
          <Route path="/search" element={<SearchPage/>}/>
          <Route path="*" element={<NotFound/>}/>
        </Routes>
      </MainLayout>
    </HashRouter>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
